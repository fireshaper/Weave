<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weave</title>
    <style>
      /* ── Splash: render before any JS/CSS loads ── */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0e1117; }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #0e1117;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Logo container with rotating ring */
      .splash-logo-wrap {
        position: relative;
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Spinning gradient ring */
      .splash-ring {
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          transparent 0%,
          #4f8ef7 40%,
          #6ba3fa 60%,
          transparent 100%
        );
        animation: splash-spin 1.6s linear infinite;
      }
      .splash-ring::after {
        content: '';
        position: absolute;
        inset: 3px;
        border-radius: 50%;
        background: #0e1117;
      }

      /* Glowing backdrop behind logo */
      .splash-glow {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(79,142,247,0.18) 0%, transparent 70%);
        animation: splash-pulse 2s ease-in-out infinite;
      }

      /* App icon */
      .splash-icon {
        position: relative;
        z-index: 1;
        width: 64px;
        height: 64px;
        border-radius: 18px;
        object-fit: cover;
      }

      /* App name */
      .splash-title {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #e6edf3;
      }

      /* Loading dots */
      .splash-dots {
        display: flex;
        gap: 7px;
        align-items: center;
      }
      .splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #4f8ef7;
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.18s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.36s; }

      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.12); }
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
        40%            { transform: translateY(-7px); opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- Splash — visible immediately, dismissed by main.tsx -->
    <div id="splash" role="status" aria-label="Loading Weave">
      <div class="splash-logo-wrap">
        <div class="splash-ring"></div>
        <div class="splash-glow"></div>
        <img class="splash-icon" src="/icons/128x128.png" alt="Weave" />
      </div>
      <div class="splash-title">Weave</div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
